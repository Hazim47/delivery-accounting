version: "3.9"

services:

  frontend:
    build:
      context: ./delivery-accounting-frontend
    container_name: delivery-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend


  backend:
    build:
      context: ./delivery-accounting-backend
    container_name: delivery-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./delivery-accounting-backend/.env
    depends_on:
      postgres:
        condition: service_healthy


  postgres:
    image: postgres:16
    container_name: delivery-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: delivery_accounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery_accounting"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data: